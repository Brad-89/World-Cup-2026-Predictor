// ── Prediction Engine ──────────────────────────────────────────────────────────
function computeFormScore(team, matches, lambda) {
  const tm = matches.filter(m => m.status==='FINISHED' && (m.homeTeamId===team.teamId||m.awayTeamId===team.teamId)).sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (!tm.length) return 0.5;
  let ws=0, tw=0;
  tm.forEach((m,i)=>{ const w=Math.exp(-lambda*i); const isH=m.homeTeamId===team.teamId; const ts=isH?m.homeScore:m.awayScore; const os=isH?m.awayScore:m.homeScore; const r=ts>os?1:ts===os?0.5:0; ws+=r*w; tw+=w; });
  return tw>0?ws/tw:0.5;
}

function norm(v,mn,mx){ return mx===mn?0.5:Math.max(0,Math.min(1,(v-mn)/(mx-mn))); }

function predict(teams, matches, weights) {
  if (!teams.length) return [];
  const stageRank={Group:1,R32:2,R16:3,QF:4,SF:5,F:6};
  const raw = teams.map(team=>{
    const gp=team.gamesPlayed||1;
    const form=computeFormScore(team,matches,weights.formDecayLambda);
    const tm=matches.filter(m=>m.status==='FINISHED'&&(m.homeTeamId===team.teamId||m.awayTeamId===team.teamId));
    const avgOpp=tm.length?tm.reduce((s,m)=>{ const oId=m.homeTeamId===team.teamId?m.awayTeamId:m.homeTeamId; const o=teams.find(t=>t.teamId===oId); return s+(stageRank[o?.currentStage]||1); },0)/tm.length:2;
    return { team, rs:{ goalsFor:team.goalsFor/gp, goalsAgainst:team.goalsAgainst/gp, shotAccuracy:team.shotsTotal>0?team.shotsOnTarget/team.shotsTotal:0, shotsOnTarget:team.shotsOnTarget/gp, possession:team.possession/100, passAccuracy:team.passAccuracy/100, form, opponentStrength:Math.min(1.2,Math.max(0.8,0.9+avgOpp*0.05)), knockoutBonus:weights.knockoutMultipliers?.[team.currentStage]||1 } };
  });
  const dims=['goalsFor','goalsAgainst','shotAccuracy','shotsOnTarget','possession','passAccuracy','form','opponentStrength','knockoutBonus'];
  const ranges={};
  dims.forEach(d=>{ const vs=raw.map(r=>r.rs[d]); ranges[d]={min:Math.min(...vs),max:Math.max(...vs)}; });
  const scored=raw.map(({team,rs})=>{
    const n={};
    dims.forEach(d=>n[d]=norm(rs[d],ranges[d].min,ranges[d].max));
    n.goalsAgainst=1-n.goalsAgainst;
    const c=Object.keys(weights).filter(k=>dims.includes(k)).reduce((s,k)=>s+(n[k]||0)*(weights[k]||0),0);
    const drivers=dims.map(k=>({factor:k,normalisedScore:n[k]||0,weight:weights[k]||0,contribution:(n[k]||0)*(weights[k]||0),rawValue:rs[k]})).sort((a,b)=>b.contribution-a.contribution);
    return {team,composite:c,breakdown:drivers};
  });
  const total=scored.reduce((s,d)=>s+d.composite,0);
  return scored.map(({team,composite,breakdown})=>({...team,probability:total>0?Math.round(composite/total*10000)/100:0,breakdown})).sort((a,b)=>b.probability-a.probability);
}

function MatchFeed({matches}) {

  const upcoming=sorted.filter(m=>m.status!=='FINISHED');
  const Card = ({m}) => {
    const d=new Date(m.date);
    const fin=m.status==='FINISHED';
    return (
      <div className={`rounded-xl border px-4 py-3 flex items-center gap-3 ${fin?'border-white/10 bg-white/[0.02]':'border-blue-500/20 bg-blue-500/5'}`}>
        <div className="text-center w-16 shrink-0">

        </div>
        <div className="flex-1 flex items-center justify-between gap-2">
          <span className="font-medium text-sm text-white text-right flex-1 text-right">{m.homeTeamName}</span>
          <div className="shrink-0 w-20 text-center">

        </div>

    );
  };
  return (
    <section>
      <h2 className="text-sm font-semibold text-gray-500 uppercase tracking-widest mb-4">Match Results</h2>
      <div className="space-y-2">
        {upcoming.length>0&&<><p className="text-xs text-blue-400 font-medium uppercase tracking-wide px-1 pt-1">Upcoming</p>{upcoming.map(m=><Card key={m.matchId} m={m}/>)}<p className="text-xs text-gray-600 font-medium uppercase tracking-wide px-1 pt-3">Completed</p></>}

  if (!withHist.length) return <div className="rounded-2xl border border-white/10 p-8 text-center text-gray-500 text-sm">No probability history yet.</div>;
  const allTs=[...new Set(withHist.flatMap(t=>t.probabilityHistory.map(h=>h.timestamp)))].sort();
  const data=allTs.map(ts=>{ const p={label:new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}; withHist.forEach(t=>{ const e=t.probabilityHistory.find(h=>h.timestamp===ts); if(e) p[t.name]=e.probability; }); return p; });

    if(!active||!payload?.length) return null;
    return <div className="bg-gray-900 border border-white/10 rounded-xl px-3 py-2 shadow-xl"><p className="text-xs text-gray-500 mb-1">{label}</p>{[...payload].sort((a,b)=>b.value-a.value).map(p=><p key={p.name} className="text-xs" style={{color:p.color}}>{p.name}: <b>{p.value?.toFixed(1)}%</b></p>)}</div>;

    <section>

      <div className="rounded-2xl border border-white/10 bg-white/[0.02] p-4">

            </button>
          );})}
        </div>
        <ResponsiveContainer width="100%" height={280}>
          <LineChart data={data} margin={{top:5,right:20,left:0,bottom:5}}>
            <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)"/>
            <XAxis dataKey="label" tick={{fill:'#6b7280',fontSize:11}} axisLine={{stroke:'rgba(255,255,255,0.1)'}} tickLine={false}/>
            <YAxis tick={{fill:'#6b7280',fontSize:11}} axisLine={false} tickLine={false} tickFormatter={v=>`${v}%`} width={42}/>
            <Tooltip content={<CustomTT/>}/>
            {withHist.map((t,i)=>sel.has(t.name)&&<Line key={t.teamId} type="monotone" dataKey={t.name} stroke={PALETTE[i%PALETTE.length]} strokeWidth={2} dot={{r:3}} activeDot={{r:5}} connectNulls/>)}
          </LineChart>
        </ResponsiveContainer>
      </div>
    </section>
  );
}

function AdminPanel({weights, setWeights}) {
  const wkeys=['goalsFor','goalsAgainst','shotAccuracy','shotsOnTarget','possession','passAccuracy','form','opponentStrength','knockoutBonus'];
  const total=wkeys.reduce((s,k)=>s+(weights[k]||0),0);
  return (
    <div className="max-w-xl mx-auto space-y-6">
      <div><h1 className="text-2xl font-black text-white">Admin Panel</h1><p className="text-gray-500 text-sm mt-1">Tune model weights in real-time. Changes apply immediately to the leaderboard.</p></div>
      <div className="rounded-2xl border border-white/10 bg-white/[0.02] p-5 space-y-4">
        <div className="flex items-center justify-between">
          <h2 className="text-sm font-semibold text-white">Model Weights</h2>
          <span className={`text-xs ${Math.abs(total-1)>0.02?'text-yellow-400':'text-emerald-400'}`}>Total: {total.toFixed(2)} {Math.abs(total-1)>0.02?'⚠':'✓'}</span>
        </div>
        {wkeys.map(k=>(
          <div key={k} className="flex items-center gap-3">
            <span className="text-sm text-gray-400 w-36 shrink-0">{FACTOR_LABELS[k]}</span>
            <input type="range" min={0} max={0.5} step={0.01} value={weights[k]||0} onChange={e=>setWeights(w=>({...w,[k]:parseFloat(e.target.value)}))} className="flex-1"/>
            <span className="text-sm font-mono text-white w-12 text-right">{(weights[k]||0).toFixed(2)}</span>
          </div>
        ))}
        <p className="text-xs text-gray-600 pt-1">Decay λ: {weights.formDecayLambda} · Knockout multipliers: Group {weights.knockoutMultipliers?.Group} → Final {weights.knockoutMultipliers?.F}</p>
      </div>
      <div className="rounded-2xl border border-white/10 bg-white/[0.02] p-5">
        <h2 className="text-sm font-semibold text-white mb-3">Manual Match Entry</h2>
        <p className="text-xs text-gray-500">In the full app, submit a POST to <code className="bg-white/5 px-1 rounded">/api/matches</code> with match result JSON. Password-protected via <code className="bg-white/5 px-1 rounded">x-admin-password</code> header.</p>
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('dashboard');
  const [weights, setWeights] = useState(DEFAULT_WEIGHTS);
  const teams = React.useMemo(() => predict(MOCK_TEAMS, MOCK_MATCHES, weights), [weights]);

  const NAV = [{id:'dashboard',label:'Dashboard'},{id:'matches',label:'Matches'},{id:'chart',label:'History'},{id:'admin',label:'Admin ⚙'}];

  return (
    <div className="min-h-screen bg-gray-950">
      {/* Header */}
      <header className="border-b border-white/10 sticky top-0 z-20 bg-gray-950/95 backdrop-blur-sm">
        <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
          <div className="flex items-center gap-3">
            <span className="text-2xl">🏆</span>
            <div>
              <h1 className="text-sm font-black text-white leading-none">WC2026 Predictor</h1>
              <p className="text-xs text-gray-600">Demo · mock data</p>
            </div>
          </div>
          <nav className="flex gap-1 flex-wrap">
            {NAV.map(n=>(
              <button key={n.id} onClick={()=>setTab(n.id)} className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${tab===n.id?'bg-emerald-600 text-white':'text-gray-500 hover:text-gray-300'}`}>{n.label}</button>
            ))}
          </nav>
        </div>
      </header>

      <main className="max-w-6xl mx-auto px-4 py-8">
        {tab==='dashboard' && (
          <div className="space-y-10">
            <div className="text-center py-4">
              <p className="text-xs text-gray-600 uppercase tracking-widest mb-1">FIFA World Cup 2026</p>
              <h1 className="text-4xl md:text-5xl font-black text-white">Who Will Win?</h1>
              <p className="text-gray-500 mt-2 text-sm max-w-xl mx-auto">Statistical model updating live as match data flows in. Powered by goals, shots, possession, form, and stage progression.</p>
            </div>
            <section>
              <h2 className="text-sm font-semibold text-gray-500 uppercase tracking-widest mb-4">Top Contenders</h2>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                {teams.slice(0,3).map((t,i)=><TopCard key={t.teamId} team={t} rank={i}/>)}
              </div>
            </section>
            <Leaderboard teams={teams}/>
          </div>
        )}
        {tab==='matches' && <MatchFeed matches={MOCK_MATCHES}/>}
        {tab==='chart' && <ProbabilityChart teams={teams}/>}
        {tab==='admin' && <AdminPanel weights={weights} setWeights={setWeights}/>}
      </main>

      <footer className="border-t border-white/5 mt-16 py-6 text-center text-xs text-gray-700">
        World Cup 2026 Winner Predictor · Statistical model, not a betting product
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
